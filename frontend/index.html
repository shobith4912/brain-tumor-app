<!DOCTYPE html>
<html>
<head>
<title>NeuroScan AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* NAV */
.nav {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}
.logo { font-size:22px; font-weight:bold; }

/* HERO */
.hero {
    text-align:center;
    margin-top:60px;
}
.hero h1 {
    font-size:60px;
    background:linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* UPLOAD */
.upload-box {
    width:600px;
    margin:40px auto;
    padding:40px;
    border:2px dashed #6366f1;
    border-radius:20px;
    text-align:center;
    transition:0.3s;
}
.upload-box:hover {
    box-shadow:0 0 25px rgba(99,102,241,0.4);
}

/* BUTTON */
.btn {
    margin-top:20px;
    padding:15px 40px;
    border-radius:30px;
    border:none;
    background:linear-gradient(90deg,#6366f1,#22d3ee);
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* RESULT SECTION */
#results {
    display:none;
}

/* RESULT HEADER */
.result-bar {
    width:80%;
    margin:40px auto;
    padding:25px;
    background:rgba(255,0,0,0.1);
    border-radius:20px;
    font-size:18px;
    text-align:center;
}

/* CARDS */
.cards {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}
.card {
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    width:200px;
    text-align:center;
    transition:0.3s;
}
.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* IMAGES */
.images {
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
}
.img-box {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    text-align:center;
}
img {
    width:220px;
    border-radius:10px;
}

/* DOWNLOAD */
.download {
    text-align:center;
    margin:40px;
}

/* FOOTER */
.footer {
    text-align:center;
    margin-top:60px;
    padding:20px;
    font-size:14px;
    color:rgba(255,255,255,0.6);
    border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">🧠 NeuroScan AI</div>
<div>Analyse | About</div>
</div>

<div class="hero">
<h1>Brain Tumor Detection & Segmentation</h1>
</div>

<div class="upload-box">
<input type="file" id="file"><br>
<button class="btn" onclick="upload()">Analyse Scan</button>
</div>

<!-- RESULTS -->
<div id="results">

<div class="result-bar" id="summary"></div>

<div class="cards">
<div class="card"><h2 id="area"></h2><p>Tumor Area</p></div>
<div class="card"><h2 id="confidence"></h2><p>Confidence</p></div>
<div class="card"><h2 id="severity"></h2><p>Severity</p></div>
<div class="card"><h2 id="location"></h2><p>Location</p></div>
</div>

<div class="images">
<div class="img-box"><h4>Original MRI</h4><img id="original"></div>
<div class="img-box"><h4>Segmentation Mask</h4><img id="mask"></div>
<div class="img-box"><h4>Tumor Overlay</h4><img id="overlay"></div>
</div>

<div class="download">
<button class="btn" onclick="downloadPDF()">Download Medical Report</button>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
Designed and Developed By <br>
<b>Kommaddi Shobith</b>, Surya Teja, Abhiramvarma
</div>

<script>
let reportData = {};

function upload() {
let fileInput = document.getElementById("file");

if (!fileInput.files[0]) {
    alert("Please upload an image");
    return;
}

let formData = new FormData();
formData.append("file", fileInput.files[0]);

fetch("/predict", {
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

document.getElementById("results").style.display = "block";

document.getElementById("area").innerText = data.area + "%";
document.getElementById("confidence").innerText = data.confidence + "%";
document.getElementById("severity").innerText = data.severity;
document.getElementById("location").innerText = data.location;

document.getElementById("summary").innerText =
"Tumor detected covering " + data.area + "% of scan area";

document.getElementById("original").src = "data:image/png;base64," + data.original_image;
document.getElementById("mask").src = "data:image/png;base64," + data.mask_image;
document.getElementById("overlay").src = "data:image/png;base64," + data.overlay_image;

reportData = data;
});
}

function downloadPDF() {
if (!reportData.area) {
alert("Analyze scan first!");
return;
}

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFontSize(18);
doc.text("NeuroScan AI - Medical Report", 20, 20);

doc.setFontSize(12);
doc.text("Tumor Area: " + reportData.area + "%", 20, 40);
doc.text("Confidence: " + reportData.confidence + "%", 20, 50);
doc.text("Severity: " + reportData.severity, 20, 60);
doc.text("Location: " + reportData.location, 20, 70);

doc.addImage("data:image/png;base64," + reportData.original_image, "PNG", 20, 90, 50, 50);
doc.addImage("data:image/png;base64," + reportData.mask_image, "PNG", 80, 90, 50, 50);
doc.addImage("data:image/png;base64," + reportData.overlay_image, "PNG", 140, 90, 50, 50);

doc.text("Note: AI-generated report. Not a clinical diagnosis.", 20, 170);

doc.save("NeuroScan_Report.pdf");
}
</script>

</body>
</html>
